<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remini GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="day">
    <header>
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Remini_Logo.svg" alt="Remini Logo">
            REMINI GPT
        </div>
        <button class="theme-toggle" id="theme-toggle">Modo Noite</button>
    </header>
    <div class="container">
        <div class="sidebar">
            <a href="#">Início</a>
            <a href="#">Sobre</a>
            <a href="#">Sugestões</a>
            <a href="#">Configurações</a>
        </div>
        <div class="main-content">
            <div class="search-bar">
                <input type="text" placeholder="Pergunta aqui...">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Search_icon.png" alt="search" width="20">
            </div>
            <div class="suggestions" id="suggestions-container">
                <!-- Sugestões serão inseridas pelo JS -->
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="temperature">19°C - Limpo</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
