<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remini GPT</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .header {
      background: #00c851;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .user {
      background: #dcf8c6;
      text-align: right;
    }

    .bot {
      background: #eee;
    }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 5px;
      border-top: 1px solid #ddd;
    }

    #input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #00c851;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      🤖 REMINI GPT
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <input id="input" type="text" placeholder="Digite sua mensagem...">
      <button onclick="enviar()">Enviar</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
