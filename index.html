<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Remini GPT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      height: 90vh;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .header {
      background: #00c851;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #fafafa;
    }

    .msg {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #dcf8c6;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #eeeeee;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      gap: 5px;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: white;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      background: #00c851;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #009c3f;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      🤖 REMINI GPT
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <input
        id="input"
        type="text"
        placeholder="Digite sua mensagem..."
      >

      <button onclick="enviar()">
        Enviar
      </button>
    </div>

  </div>

  <script src="./script.js"></script>

</body>

</html>
