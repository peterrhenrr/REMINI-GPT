<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Remini GPT</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      background:#f5f5f5;

      font-family:Arial, sans-serif;

      height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;
    }

    .container-chat{

      width:420px;

      height:90vh;

      background:white;

      border-radius:15px;

      overflow:hidden;

      display:flex;

      flex-direction:column;

      box-shadow:
      0 0 15px rgba(0,0,0,0.1);
    }

    .topbar{

      background:#00c851;

      color:white;

      padding:15px;

      display:flex;

      justify-content:space-between;

      align-items:center;

      gap:10px;
    }

    .topbar h3{

      margin:0;

      font-size:20px;

      font-weight:bold;

      white-space:nowrap;
    }

    #chat{

      flex:1;

      padding:15px;

      overflow-y:auto;

      background:#fafafa;
    }

    .msg{

      padding:10px 14px;

      border-radius:10px;

      margin-bottom:10px;

      max-width:80%;

      word-wrap:break-word;
    }

    .user{

      background:#d1ffd6;

      margin-left:auto;

      text-align:right;
    }

    .bot{

      background:#eeeeee;

      margin-right:auto;
    }

    .input-area{

      padding:10px;

      border-top:1px solid #ddd;

      background:white;
    }

    #input{

      border-radius:10px !important;
    }

    .btn-success{

      border-radius:10px;
    }

    /* =========================
       MICROFONE
    ========================= */

    .btn-mic{

      border-radius:10px !important;

      width:50px;

      font-size:20px;

      transition:0.3s;

      border:none !important;
    }

    /* PARADO */

    .mic-off{

      background:#212529 !important;

      color:white !important;
    }

    /* GRAVANDO */

    .mic-on{

      background:#ff0000 !important;

      color:white !important;

      animation:pulse 1s infinite;
    }

    @keyframes pulse {

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.1);
      }

      100%{
        transform:scale(1);
      }
    }

    select{

      width:140px !important;
    }

    .typing{

      opacity:0.7;

      font-style:italic;
    }

    /* MOBILE */

    @media(max-width:500px){

      .container-chat{

        width:100%;

        height:100vh;

        border-radius:0;
      }

      .topbar h3{

        font-size:18px;
      }

      select{

        width:120px !important;
      }
    }

  </style>

</head>

<body>

  <div class="container-chat">

    <!-- TOPO -->
    <div class="topbar">

      <h3>
        🤖 Remini GPT
      </h3>

      <!-- seletor IA -->
      <select
        id="provider"
        class="form-select"
      >

        <option value="azure">
          ChatGPT
        </option>

        <option value="gemini">
          Gemini
        </option>

      </select>

    </div>


    <!-- CHAT -->
    <div id="chat">

      <div class="msg bot">
        Olá 👋<br>
        Posso conversar por texto e voz.
      </div>

    </div>


    <!-- INPUT -->
    <div class="input-area">

      <div class="input-group">

        <!-- TEXTO -->
        <input
          type="text"
          id="input"
          class="form-control"
          placeholder="Digite sua mensagem..."
          autocomplete="off"
        >

        <!-- MICROFONE -->
        <button
          type="button"
          id="btnMic"
          class="btn btn-mic mic-off"
          onclick="gravarAudio()"
          title="Falar"
        >
          🎤
        </button>

        <!-- ENVIAR -->
        <button
          type="button"
          class="btn btn-success"
          onclick="enviar()"
        >
          Enviar
        </button>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->
  <script src="./script.js"></script>

</body>

</html>
