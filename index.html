<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remini GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="day">
    <header>
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Remini_Logo.svg" alt="Remini Logo" class="logo">
            <h1>REMNI GPT</h1>
            <p>Seu assistente inteligente</p>
        </div>
        <button class="theme-toggle" id="theme-toggle">Modo Noite</button>
    </header>

    <main>
        <div class="search-bar">
            <input type="text" placeholder="Pergunta aqui..." id="search-input">
            <button class="send-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Send_icon.png" alt="Enviar">
            </button>
        </div>

        <h2 class="suggestions-title">💡 SUGESTÕES PARA VOCÊ COMEÇAR</h2>
        <div class="suggestions" id="suggestions-container">
            <!-- Cards de sugestões serão inseridos pelo JS -->
        </div>
    </main>

    <footer>
        <div class="temperature">19°C - Limpo</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
