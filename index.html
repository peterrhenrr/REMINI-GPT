<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Remini GPT</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f5f5f5;
      font-family:Arial, sans-serif;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container-chat{

      width:420px;
      height:90vh;

      background:white;

      border-radius:15px;

      overflow:hidden;

      display:flex;
      flex-direction:column;

      box-shadow:
      0 0 15px rgba(0,0,0,0.1);
    }

    .topbar{

      background:#00c851;

      color:white;

      padding:15px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .topbar h3{
      margin:0;
      font-size:20px;
      font-weight:bold;
    }

    #chat{

      flex:1;

      padding:15px;

      overflow-y:auto;

      background:#fafafa;
    }

    .msg{

      padding:10px 14px;

      border-radius:10px;

      margin-bottom:10px;

      max-width:80%;

      word-wrap:break-word;
    }

    .user{

      background:#d1ffd6;

      margin-left:auto;

      text-align:right;
    }

    .bot{

      background:#eeeeee;

      margin-right:auto;
    }

    .input-area{

      padding:10px;

      border-top:1px solid #ddd;

      background:white;
    }

    #input{

      border-radius:10px;
    }

    .btn-success{

      border-radius:10px;
    }

    select{

      width:140px !important;
    }

  </style>

</head>

<body>

  <div class="container-chat">

    <!-- TOPO -->
    <div class="topbar">

      <h3>
        🤖 Remini GPT
      </h3>

      <!-- seletor IA -->
      <select
        id="provider"
        class="form-select"
      >

        <option value="azure">
          ChatGPT
        </option>

        <option value="gemini">
          Gemini
        </option>

      </select>

    </div>


    <!-- CHAT -->
    <div id="chat"></div>


    <!-- INPUT -->
    <div class="input-area">

      <div class="input-group">

        <input
          type="text"
          id="input"
          class="form-control"
          placeholder="Digite sua mensagem..."
        >

        <button
          class="btn btn-success"
          onclick="enviar()"
        >
          Enviar
        </button>

      </div>

    </div>

  </div>

  <!-- script -->
  <script src="./script.js"></script>

</body>

</html>
