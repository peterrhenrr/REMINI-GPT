<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remini GPT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-chat">
    <div class="logo-container">
        <svg class="robot-logo" width="100" height="100" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#00C851;stop-opacity:1"/>
                    <stop offset="100%" style="stop-color:#007E33;stop-opacity:1"/>
                </linearGradient>
            </defs>
            <rect x="30" y="30" width="60" height="60" rx="12" ry="12" fill="url(#grad)" />
            <circle cx="45" cy="50" r="6" fill="#fff"/>
            <circle cx="75" cy="50" r="6" fill="#fff"/>
            <line x1="60" y1="30" x2="60" y2="15" stroke="#00C851" stroke-width="4"/>
            <circle cx="60" cy="12" r="4" fill="#00C851"/>
        </svg>
        <h1>REMNI-GPT</h1>
    </div>

    <div class="chat-window" id="chat-window">
        <!-- Mensagens aparecerão aqui -->
    </div>

    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Digite sua mensagem...">
        <button class="send-btn">✈️</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
