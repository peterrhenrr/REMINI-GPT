<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remini GPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="day">
    <header>
        <div class="logo-container">
            <!-- Logo do robô estilizado -->
            <div class="robot-logo">
                <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <!-- Corpo do robô com gradiente -->
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00C851;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#007E33;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect x="30" y="30" width="60" height="60" rx="12" ry="12" fill="url(#grad1)" filter="url(#shadow)" />
                    <!-- Olhos -->
                    <circle cx="45" cy="50" r="6" fill="#fff"/>
                    <circle cx="75" cy="50" r="6" fill="#fff"/>
                    <!-- Antena -->
                    <line x1="60" y1="30" x2="60" y2="15" stroke="#00C851" stroke-width="4"/>
                    <circle cx="60" cy="12" r="4" fill="#00C851"/>
                    <!-- Sombra -->
                    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
                    </filter>
                </svg>
                <div class="robot-text">REMNI-GPT</div>
            </div>
        </div>
        <button class="theme-toggle" id="theme-toggle">Modo Noite</button>
    </header>

    <main>
        <div class="search-bar">
            <input type="text" placeholder="Pergunta aqui..." id="search-input">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Search_icon.png" alt="Pesquisar" class="search-icon">
        </div>

        <h2 class="suggestions-title">💡 SUGESTÕES PARA VOCÊ COMEÇAR</h2>
        <div class="suggestions" id="suggestions-container">
            <!-- Cards de sugestões adicionados pelo JS -->
        </div>
    </main>

    <footer>
        <div class="temperature">19°C - Limpo</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
